name: Build Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cài đặt JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build bằng Maven
        run: mvn -B clean package

      - name: Upload file .jar đã build
        uses: actions/upload-artifact@v4
        with:
          name: ClearLagStorage-jar
          path: target/*.jar
